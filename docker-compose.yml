version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: blueprint_db
    environment:
      POSTGRES_DB: blueprint_db
      POSTGRES_USER: blueprint_user
      POSTGRES_PASSWORD: blueprint_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
